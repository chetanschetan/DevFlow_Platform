version: '3.8'

services:
  # Database: MongoDB
  mongodb:
    image: mongo:latest
    container_name: devflow-db
    ports:
      - "27017:27017"
    volumes:
      - devflow-data:/data/db

  # Backend: Scaled to 3 instances for load balancing
  backend:
    build: ./backend
    # 1. This "pours" your secrets into the container automatically
    env_file:
      - ./backend/.env
      # 2. Only list variables here that are NOT in your .env file  
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - mongodb
    # This automatically starts 3 separate backend containers
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  # Load Balancer: NGINX
  nginx:
    image: nginx:latest
    container_name: devflow-lb
    ports:
      - "80:80"
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  # Frontend: Vite/React
  frontend:
    build: ./frontend
    container_name: devflow-ui
    ports:
      - "5174:5174"
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=production
    depends_on:
      - nginx

volumes:
  devflow-data: